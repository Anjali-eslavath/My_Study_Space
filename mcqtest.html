// SELECT QUESTIONS
const questions = questionBank[subject][difficulty];

// LOAD QUESTIONS
const form = document.getElementById("quizForm");

questions.forEach((q,index)=>{
let div=document.createElement("div");
div.classList.add("question");

div.innerHTML=`
<p><b>${index+1}. ${q.q}</b></p>
${q.options.map(opt=>`
<label>
<input type="radio" name="q${index}" value="${opt}">
${opt}
</label><br>`).join("")}
`;

form.appendChild(div);
});

// TIMER (10 mins default)
// SET TIME BASED ON DIFFICULTY
let totalSeconds;

if(difficulty === "easy"){
    totalSeconds = 30 * 60; // 30 minutes
}
else if(difficulty === "medium"){
    totalSeconds = 60 * 60; // 1 hour
}
else if(difficulty === "hard"){
    totalSeconds = 90 * 60; // 1 hour 30 minutes
}

// TIMER
let timer = setInterval(()=>{
let m = Math.floor(totalSeconds / 60);
let s = totalSeconds % 60;

if(s < 10) s = "0" + s;

document.getElementById("timer").innerText = m + ":" + s;

totalSeconds--;

if(totalSeconds < 0){
clearInterval(timer);
submitTest();
}
},1000);

// SUBMIT
function submitTest(){


// 🚫 Stop multiple submissions
if(submitted){
alert("Test already submitted!");
return;
}

submitted = true;

clearInterval(timer);

let score=0;
let result="";

questions.forEach((q,i)=>{

let selected=document.querySelector(`input[name="q${i}"]:checked`);

// Disable all options after submit
let options = document.querySelectorAll(`input[name="q${i}"]`);
options.forEach(opt => opt.disabled = true);

if(selected){
if(selected.value===q.answer){
score++;
result+=`<p>Q${i+1}: ✅ Correct</p>`;
}else{
result+=`<p>Q${i+1}: ❌ Wrong (Ans: ${q.answer})</p>`;
}
}else{
result+=`<p>Q${i+1}: ❌ Not Attempted (Ans: ${q.answer})</p>`;
}

});

// Disable submit button
document.querySelector("button").disabled = true;
// ✅ SAVE RESULT
try{
db.collection("results").add({
  username: localStorage.getItem("loggedInUser"), // ✅ ADD THIS LINE
  type: "mcq",
  subject: subject,
  difficulty: difficulty,
  score: score,
  total: questions.length,
  accuracy: ((score / questions.length) * 100).toFixed(2),
  time: new Date()
})
.then(() => {
  console.log("✅ Data saved successfully");
})
.catch((error) => {
  console.error("❌ Firestore error:", error);
});
}catch(e){
console.log("Firebase error:", e);
}



let box=document.getElementById("resultBox");
box.style.display="block";
box.innerHTML=`<h3>Score: ${score}/${questions.length}</h3>${result}`;

}

</script>
